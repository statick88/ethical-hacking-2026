version: "3.8"

services:
  victim-endpoint:
    image: ubuntu:22.04
    container_name: lab6-victim
    hostname: victim-corp
    ports:
      - "2222:22"
    networks:
      lab6-net:
        ipv4_address: 172.18.6.10
    privileged: true
    command: >
      bash -c "apt-get update && apt-get install -y openssh-server clamav auditd rsyslog iputils-ping python3 && service ssh start && service auditd start && echo Monitoring process creation... > /var/log/edr_agent.log && tail -f /var/log/edr_agent.log"

  kali:
    image: kalilinux/kali-rolling
    container_name: lab6-kali
    tty: true
    stdin_open: true
    privileged: true
    networks:
      lab6-net:
        ipv4_address: 172.18.6.20
    environment:
      - DEBIAN_FRONTEND=noninteractive
    command: >
      bash -c "apt-get update && apt-get install -y golang build-essential python3 python3-pip msfpc upx && pip3 install pyarmor && tail -f /dev/null"

networks:
  lab6-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.6.0/24