<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#002b36"/>
  <text x="400" y="50" font-family="Arial" font-size="28" fill="#b58900" text-anchor="middle" font-weight="bold">🔐 UNIDAD 4: Redes y Servicios</text>
  
  <!-- Network Layers -->
  <rect x="20" y="80" width="380" height="180" rx="10" fill="#073642" stroke="#2aa198" stroke-width="2"/>
  <text x="210" y="110" font-family="Arial" font-size="18" fill="#2aa198" text-anchor="middle" font-weight="bold">MODELO OSI</text>
  
  <text x="40" y="145" font-family="Arial" font-size="12" fill="#fff">7️⃣ Aplicación</text>
  <text x="40" y="168" font-family="Arial" font-size="12" fill="#fff">6️⃣ Presentación</text>
  <text x="40" y="191" font-family="Arial" font-size="12" fill="#fff">5️⃣ Sesión</text>
  <text x="40" y="214" font-family="Arial" font-size="12" fill="#fff">4️⃣ Transporte</text>
  <text x="40" y="237" font-family="Arial" font-size="12" fill="#fff">3️⃣ Red</text>
  <text x="40" y="260" font-family="Arial" font-size="12" fill="#fff">2️⃣ Enlace de Datos</text>
  <text x="40" y="283" font-family="Arial" font-size="12" fill="#fff">1️⃣ Física</text>
  
  <!-- Attack Types -->
  <rect x="420" y="80" width="360" height="180" rx="10" fill="#073642" stroke="#dc322f" stroke-width="2"/>
  <text x="600" y="110" font-family="Arial" font-size="18" fill="#dc322f" text-anchor="middle" font-weight="bold">ATAQUES DE RED</text>
  
  <text x="440" y="145" font-family="Arial" font-size="12" fill="#dc322f">🌐 ARP Spoofing</text>
  <text x="440" y="168" font-family="Arial" font-size="12" fill="#dc322f">📡 DNS Poisoning</text>
  <text x="440" y="191" font-family="Arial" font-size="12" fill="#dc322f">💥 DoS/DDoS</text>
  <text x="440" y="214" font-family="Arial" font-size="12" fill="#dc322f">🔓 Man in the Middle</text>
  <text x="440" y="237" font-family="Arial" font-size="12" fill="#dc322f">📶 Rogue AP</text>
  <text x="440" y="260" font-family="Arial" font-size="12" fill="#dc322f">🔐 VLAN Hopping</text>
  
  <!-- Tools -->
  <rect x="20" y="280" width="760" height="90" rx="10" fill="#073642" stroke="#b58900" stroke-width="2"/>
  <text x="400" y="310" font-family="Arial" font-size="16" fill="#b58900" text-anchor="middle" font-weight="bold">HERRAMIENTAS DE ANÁLISIS DE RED</text>
  
  <text x="50" y="345" font-family="Arial" font-size="14" fill="#2aa198">🔍 Wireshark</text>
  <text x="180" y="345" font-family="Arial" font-size="14" fill="#2aa198">📡 Ettercap</text>
  <text x="310" y="345" font-family="Arial" font-size="14" fill="#2aa198">🕷️ Bettercap</text>
  <text x="440" y="345" font-family="Arial" font-size="14" fill="#2aa198">💉 Responder</text>
  <text x="570" y="345" font-family="Arial" font-size="14" fill="#2aa198">🔐 CrackMapExec</text>
  <text x="720" y="345" font-family="Arial" font-size="14" fill="#2aa198">🛠️ Netcat</text>
</svg>
