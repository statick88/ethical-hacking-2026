<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#002b36"/>
  <text x="400" y="50" font-family="Arial" font-size="28" fill="#b58900" text-anchor="middle" font-weight="bold">🕷️ UNIDAD 3: Explotación Web y APIs</text>
  
  <!-- OWASP Top 10 2025 -->
  <rect x="20" y="80" width="240" height="280" rx="10" fill="#073642" stroke="#dc322f" stroke-width="2"/>
  <text x="140" y="110" font-family="Arial" font-size="16" fill="#dc322f" text-anchor="middle" font-weight="bold">OWASP Top 10 2025</text>
  
  <text x="40" y="145" font-family="Arial" font-size="11" fill="#dc322f">A01 🔐 Broken Access Control</text>
  <text x="40" y="168" font-family="Arial" font-size="11" fill="#b58900">A02 🔒 Cryptographic Failures</text>
  <text x="40" y="191" font-family="Arial" font-size="11" fill="#dc322f">A03 💉 Injection</text>
  <text x="40" y="214" font-family="Arial" font-size="11" fill="#b58900">A04 🎨 Insecure Design</text>
  <text x="40" y="237" font-family="Arial" font-size="11" fill="#859900">A05 ⚙️ Misconfiguration</text>
  <text x="40" y="260" font-family="Arial" font-size="11" fill="#b58900">A06 📦 Vulnerable Components</text>
  <text x="40" y="283" font-family="Arial" font-size="11" fill="#b58900">A07 🔑 Auth Failures</text>
  <text x="40" y="306" font-family="Arial" font-size="11" fill="#859900">A08 📊 Data Integrity</text>
  <text x="40" y="329" font-family="Arial" font-size="11" fill="#859900">A09 📝 Logging Failures</text>
  <text x="40" y="352" font-family="Arial" font-size="11" fill="#dc322f">A10 🌐 SSRF</text>
  
  <!-- Attack Vectors -->
  <rect x="280" y="80" width="240" height="180" rx="10" fill="#073642" stroke="#b58900" stroke-width="2"/>
  <text x="400" y="110" font-family="Arial" font-size="16" fill="#b58900" text-anchor="middle" font-weight="bold">VECTORES DE ATAQUE</text>
  
  <text x="300" y="145" font-family="Arial" font-size="12" fill="#fff">💉 SQL Injection</text>
  <text x="300" y="168" font-family="Arial" font-size="12" fill="#fff">🔨 XSS</text>
  <text x="300" y="191" font-family="Arial" font-size="12" fill="#fff">🌐 CSRF</text>
  <text x="300" y="214" font-family="Arial" font-size="12" fill="#fff">🔓 IDOR</text>
  <text x="300" y="237" font-family="Arial" font-size="12" fill="#fff">💥 XXE</text>
  <text x="300" y="260" font-family="Arial" font-size="12" fill="#fff">🔐 Deserialización</text>
  
  <!-- Tools -->
  <rect x="540" y="80" width="240" height="280" rx="10" fill="#073642" stroke="#2aa198" stroke-width="2"/>
  <text x="660" y="110" font-family="Arial" font-size="16" fill="#2aa198" text-anchor="middle" font-weight="bold">HERRAMIENTAS</text>
  
  <text x="560" y="145" font-family="Arial" font-size="12" fill="#2aa198">🕷️ Burp Suite</text>
  <text x="560" y="168" font-family="Arial" font-size="12" fill="#2aa198">💉 SQLMap</text>
  <text x="560" y="191" font-family="Arial" font-size="12" fill="#2aa198">🌐 Nikto</text>
  <text x="560" y="214" font-family="Arial" font-size="12" fill="#2aa198">🔍 FFUF</text>
  <text x="560" y="237" font-family="Arial" font-size="12" fill="#2aa198">📡 Amass</text>
  <text x="560" y="260" font-family="Arial" font-size="12" fill="#2aa198">🛠️ Nuclei</text>
  <text x="560" y="283" font-family="Arial" font-size="12" fill="#2aa198">🔐 Hydra</text>
  <text x="560" y="306" font-family="Arial" font-size="12" fill="#2aa198">📦 JWT Tool</text>
  <text x="560" y="329" font-family="Arial" font-size="12" fill="#2aa198">🔍 GraphQL Voyager</text>
  <text x="560" y="352" font-family="Arial" font-size="12" fill="#2aa198">💉 NoSQLMap</text>
  
  <!-- API Security -->
  <rect x="280" y="280" width="240" height="80" rx="10" fill="#073642" stroke="#859900" stroke-width="2"/>
  <text x="400" y="310" font-family="Arial" font-size="14" fill="#859900" text-anchor="middle" font-weight="bold">SEGURIDAD API</text>
  <text x="400" y="340" font-family="Arial" font-size="11" fill="#fff">REST • GraphQL • gRPC • WebSocket</text>
</svg>
