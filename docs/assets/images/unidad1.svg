  <circle cx="120" cy="280" r="40" fill="#002b36" stroke="#3498db" stroke-width="2"/>
  <text x="120" y="275" font-family="Arial" font-size="24" text-anchor="middle">🗺️</text>
  <text x="120" y="335" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">Nmap</text>
  
  <circle cx="250" cy="280" r="40" fill="#002b36" stroke="#3498db" stroke-width="2"/>
