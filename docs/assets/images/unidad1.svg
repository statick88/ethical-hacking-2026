  <text x="280" y="125" font-family="Arial" font-size="12" fill="#839496" text-anchor="middle">Enumeration</text>
  
  <rect x="370" y="80" width="140" height="60" rx="10" fill="#073642" stroke="#dc322f" stroke-width="2"/>
