  <rect x="690" y="80" width="60" height="60" rx="10" fill="#073642" stroke="#859900" stroke-width="2"/>
  <text x="720" y="115" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">📝</text>
  
  <!-- Arrows -->
  <path d="M190 110 L210 110" stroke="#2aa198" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M350 110 L370 110" stroke="#2aa198" stroke-width="2" fill="none"/>
  <path d="M510 110 L530 110" stroke="#2aa198" stroke-width="2" fill="none"/>
  
