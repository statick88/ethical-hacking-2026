version: '3.8'

services:
  # OpenPLC Runtime - PLC Editor y Execution Engine
  openplc:
    image: openplcproject/openplc-v3:2024.11
    container_name: lab7-openplc
    hostname: openplc
    ports:
      - "8080:8080"     # OpenPLC Web UI (editor y monitoreo)
      - "502:502"       # Modbus TCP (protocolo industrial estándar)
      - "1102:1102"     # OPC-UA (opcional, para labs avanzados)
      - "21:21"         # FTP (para upload de programas)
    environment:
      - TZ=UTC
      - LOG_LEVEL=INFO
    networks:
      lab7-net:
        ipv4_address: 172.18.7.10
    volumes:
      - openplc-data:/root/OpenPLC_v3/projects
      - openplc-runtime:/root/OpenPLC_v3
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  # HMI (Human Machine Interface) - Supervisory Control simulador
  # Opcional: si quieres una interfaz visual para monitorear el PLC
  grafana:
    image: grafana/grafana:latest
    container_name: lab7-hmi
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      lab7-net:
        ipv4_address: 172.18.7.15
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Atacante con herramientas de testing de SCADA/ICS
  kali:
    image: kalilinux/kali-rolling:2025.1
    container_name: lab7-kali
    tty: true
    stdin_open: true
    privileged: true
    networks:
      lab7-net:
        ipv4_address: 172.18.7.20
    volumes:
      - kali-data:/root
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    depends_on:
      openplc:
        condition: service_healthy

networks:
  lab7-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.7.0/24

volumes:
  openplc-data:
    driver: local
  openplc-runtime:
    driver: local
  grafana-data:
    driver: local
  kali-data:
    driver: local
