version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lab8-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=vulnerable_api
    depends_on:
      db:
        condition: service_healthy
    networks:
      lab8-net:
        ipv4_address: 172.18.8.10
    volumes:
      - /tmp:/tmp
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mariadb:11.4
    container_name: lab8-db
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=vulnerable_api
      - MYSQL_USER=apiuser
      - MYSQL_PASSWORD=apipass
    networks:
      lab8-net:
        ipv4_address: 172.18.8.20
    volumes:
      - db-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kali:
    image: kalilinux/kali-rolling:2025.1
    container_name: lab8-kali
    tty: true
    stdin_open: true
    privileged: true
    networks:
      lab8-net:
        ipv4_address: 172.18.8.30
    volumes:
      - kali-data:/root
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

networks:
  lab8-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.8.0/24

volumes:
  db-data:
    driver: local
  kali-data:
    driver: local
