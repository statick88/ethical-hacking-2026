services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lab8-api
    ports:
      - "8888:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=vulnerable_api
    depends_on:
      db:
        condition: service_started
    networks:
      - lab8-net
    volumes:
      - /tmp:/tmp
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mariadb:11.4
    container_name: lab8-db
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=vulnerable_api
      - MYSQL_USER=apiuser
      - MYSQL_PASSWORD=apipass
    networks:
      - lab8-net
    volumes:
      - db-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -ppassword || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  kali:
    image: kalilinux/kali-rolling:latest
    container_name: lab8-kali
    tty: true
    stdin_open: true
    privileged: true
    networks:
      - lab8-net
    volumes:
      - kali-data:/root
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

networks:
  lab8-net:
    driver: bridge

volumes:
  db-data:
    driver: local
  kali-data:
    driver: local
