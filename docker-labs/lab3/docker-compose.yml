version: "3.8"

services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: lab3-dvwa
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=dvwa
    networks:
      lab3-net:
        ipv4_address: 172.18.3.10
    depends_on:
      - db

  db:
    image: mariadb:10.5
    container_name: lab3-db
    environment:
      - MYSQL_ROOT_PASSWORD=password
    networks:
      lab3-net:
        ipv4_address: 172.18.3.11

  juice-shop:
    image: bkimminich/juice-shop
    container_name: lab3-juice-shop
    ports:
      - "3000:3000"
    networks:
      lab3-net:
        ipv4_address: 172.18.3.12

  vapi:
    image: roottusk/vapi
    container_name: lab3-vapi
    ports:
      - "8081:80"
    networks:
      lab3-net:
        ipv4_address: 172.18.3.13

  kali:
    image: kalilinux/kali-rolling
    container_name: lab3-kali
    tty: true
    stdin_open: true
    privileged: true
    networks:
      lab3-net:
        ipv4_address: 172.18.3.20
    command: tail -f /dev/null

networks:
  lab3-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.3.0/24