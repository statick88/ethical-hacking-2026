<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#002b36"/>
  <text x="400" y="50" font-family="Arial" font-size="28" fill="#b58900" text-anchor="middle" font-weight="bold">🤖 UNIDAD 2: Seguridad en IA y LLMs</text>
  
  <!-- OWASP LLM Top 10 -->
  <rect x="20" y="80" width="360" height="280" rx="10" fill="#073642" stroke="#dc322f" stroke-width="2"/>
  <text x="200" y="110" font-family="Arial" font-size="18" fill="#dc322f" text-anchor="middle" font-weight="bold">OWASP LLM Top 10</text>
  
  <text x="40" y="145" font-family="Arial" font-size="12" fill="#2aa198">🗨️ LLM01 Prompt Injection</text>
  <text x="40" y="170" font-family="Arial" font-size="12" fill="#2aa198">📤 LLM02 Insecure Output</text>
  <text x="40" y="195" font-family="Arial" font-size="12" fill="#2aa198">☠️ LLM03 Training Data Poisoning</text>
  <text x="40" y="220" font-family="Arial" font-size="12" fill="#dc322f">💣 LLM04 Model DoS</text>
  <text x="40" y="245" font-family="Arial" font-size="12" fill="#b58900">⛓️ LLM05 Supply Chain</text>
  <text x="40" y="270" font-family="Arial" font-size="12" fill="#dc322f">🔓 LLM06 Sensitive Info</text>
  <text x="40" y="295" font-family="Arial" font-size="12" fill="#b58900">🔌 LLM07 Insecure Plugins</text>
  <text x="40" y="320" font-family="Arial" font-size="12" fill="#859900">🦸 LLM08 Excessive Agency</text>
  
  <!-- Attack Types -->
  <rect x="400" y="80" width="380" height="130" rx="10" fill="#073642" stroke="#b58900" stroke-width="2"/>
  <text x="590" y="110" font-family="Arial" font-size="18" fill="#b58900" text-anchor="middle" font-weight="bold">TÉCNICAS DE ATAQUE</text>
  
  <text x="420" y="145" font-family="Arial" font-size="13" fill="#fff">💉 Direct Prompt Injection</text>
  <text x="420" y="170" font-family="Arial" font-size="13" fill="#fff">🌐 Indirect Prompt Injection</text>
  <text x="420" y="195" font-family="Arial" font-size="13" fill="#fff">🦁 DAN (Do Anything Now)</text>
  
  <!-- Defense -->
  <rect x="400" y="230" width="380" height="130" rx="10" fill="#073642" stroke="#859900" stroke-width="2"/>
  <text x="590" y="260" font-family="Arial" font-size="18" fill="#859900" text-anchor="middle" font-weight="bold">DEFENSAS</text>
  
  <text x="420" y="295" font-family="Arial" font-size="13" fill="#fff">🔀 Delimitadores claros</text>
  <text x="420" y="320" font-family="Arial" font-size="13" fill="#fff">✅ Validación de entrada</text>
  <text x="420" y="345" font-family="Arial" font-size="13" fill="#fff">🔐 Principle of Least Privilege</text>
</svg>
